name: Build Plugins

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '25'

      - name: Install latest mulby-cli globally
        run: npm install -g mulby-cli

      - name: Create releases directory
        run: mkdir -p releases

      - name: Build and pack all plugins
        run: |
          PLUGINS_JSON='{"version":"1.0.0","plugins":[]}'
          
          for plugin_dir in plugins/*/; do
            if [ -f "$plugin_dir/package.json" ]; then
              plugin_name=$(basename "$plugin_dir")
              echo "Processing plugin: $plugin_name"
              
              # Use subshell to isolate directory changes
              (
                cd "$plugin_dir" || exit 1
                
                npm install --include=dev || exit 1
                npm run build || exit 1
                npm run pack || exit 1
                
                # Find and move the inplugin file
                inplugin_file=$(ls -1 *.inplugin 2>/dev/null | head -n1)
                if [ -z "$inplugin_file" ]; then
                  echo "Error: No .inplugin file generated for $plugin_name"
                  exit 1
                fi
                
                echo "Found inplugin file: $inplugin_file"
                mv "$inplugin_file" ../../releases/
                
                # Read manifest.json and create plugin entry
                if [ -f "manifest.json" ]; then
                  node -e "
                    const fs = require('fs');
                    const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
                    const pkgJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
                    const pluginInfo = {
                      id: manifest.id,
                      name: manifest.displayName || manifest.name,
                      version: manifest.version,
                      author: manifest.author || 'Unknown',
                      description: manifest.description || '',
                      downloadUrl: 'https://github.com/${{ github.repository }}/releases/download/latest/$inplugin_file',
                      lastPackageTime: new Date().toISOString()
                    };
                    console.log(JSON.stringify(pluginInfo));
                  " >> ../../plugins_temp.jsonl
                fi
              ) || {
                echo "Failed to process plugin: $plugin_name"
                exit 1
              }
            fi
          done
          
          # Combine all plugin info into plugins.json
          if [ -f "plugins_temp.jsonl" ]; then
            node -e "
              const fs = require('fs');
              const lines = fs.readFileSync('plugins_temp.jsonl', 'utf-8').trim().split('\n');
              const plugins = lines.map(line => JSON.parse(line));
              const output = {
                version: '1.0.0',
                plugins: plugins
              };
              console.log(JSON.stringify(output, null, 2));
            " > plugins.json
            rm plugins_temp.jsonl
          else
            echo "$PLUGINS_JSON" > plugins.json
          fi

      - name: Commit and push packaged files
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add -f releases/* plugins.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add packaged plugin files and update plugins.json" && git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git)